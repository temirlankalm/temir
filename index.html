<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Temirlan Kalmukhan — Voxel Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87b5e8; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }

  /* ---------- HUD ---------- */
  #crosshair {
    position: fixed; left: 50%; top: 50%; width: 22px; height: 22px;
    transform: translate(-50%, -50%); pointer-events: none; z-index: 20; opacity: .75;
  }
  #crosshair::before, #crosshair::after {
    content: ""; position: absolute; background: #fff; box-shadow: 0 0 2px rgba(0,0,0,.6);
  }
  #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

  #hotbar {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; padding: 4px; background: rgba(0,0,0,.35);
    border: 2px solid rgba(0,0,0,.5); border-radius: 4px; z-index: 20; pointer-events: none;
  }
  .slot {
    width: 46px; height: 46px; border: 2px solid #5a5a5a; background: rgba(139,139,139,.5);
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .slot.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,.3) inset; }
  .slot { position: relative; }
  .slot .num { position: absolute; top: 1px; left: 3px; font-size: 10px; font-weight: 700;
               color: #fff; text-shadow: 0 1px 2px #000; }

  #compass {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    color: #fff; font-weight: 700; letter-spacing: 3px; text-shadow: 0 2px 4px rgba(0,0,0,.6);
    z-index: 20; pointer-events: none; font-size: 14px; background: rgba(0,0,0,.25);
    padding: 6px 16px; border-radius: 999px;
  }

  #zoneToast {
    position: fixed; top: 56px; left: 50%; transform: translateX(-50%) translateY(-10px);
    color: #fff; z-index: 20; pointer-events: none; text-align: center; opacity: 0;
    transition: opacity .4s, transform .4s; text-shadow: 0 2px 6px rgba(0,0,0,.7);
  }
  #zoneToast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #zoneToast .big { font-size: 30px; font-weight: 800; letter-spacing: 1px; }
  #zoneToast .small { font-size: 13px; opacity: .85; margin-top: 2px; letter-spacing: 4px; text-transform: uppercase; }

  /* ---------- Overlay / Minecraft-style main menu ---------- */
  #overlay {
    position: fixed; inset: 0; z-index: 40; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    background: rgba(0,0,0,.45); backdrop-filter: blur(2px); transition: opacity .35s;
    font-family: 'Press Start 2P', 'Courier New', monospace; color: #fff;
    image-rendering: pixelated;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  /* Minecraft logo */
  .mc-logo { text-align: center; user-select: none; margin-bottom: 14px; line-height: 1; }
  .mc-logo .title-img {
    width: min(560px, 88vw); height: auto; display: block; margin: 0 auto;
    image-rendering: auto; filter: drop-shadow(4px 8px 8px rgba(0,0,0,.55));
  }
  .mc-logo .edition {
    display: inline-block; margin-top: 18px; font-size: clamp(10px, 2.4vw, 17px);
    color: #d8d8d8; letter-spacing: 1px;
    text-shadow: 2px 2px 0 #4a4a4a, 3px 4px 6px rgba(0,0,0,.5);
  }
  .splash {
    position: absolute; right: 4%; top: clamp(70px, 16vh, 150px);
    color: #ffff00; font-family: 'Press Start 2P', monospace; font-size: clamp(9px, 1.6vw, 14px);
    transform: rotate(-18deg); transform-origin: center;
    text-shadow: 2px 2px 0 #3f3f00; animation: splashPulse 1s ease-in-out infinite;
    pointer-events: none; white-space: nowrap;
  }
  @keyframes splashPulse { 0%,100%{ transform: rotate(-18deg) scale(1);} 50%{ transform: rotate(-18deg) scale(1.12);} }

  /* Stone buttons */
  .mc-btn {
    display: block; width: min(420px, 82vw); margin: 0 auto; padding: 15px 12px;
    font-family: 'Press Start 2P', monospace; font-size: 12px; letter-spacing: .5px;
    color: #fff; text-shadow: 2px 2px 0 #3a3a3a; cursor: pointer; image-rendering: pixelated;
    background: linear-gradient(rgba(255,255,255,.16), rgba(255,255,255,0) 46%, rgba(0,0,0,.20)), #6d6d6d;
    border: 2px solid #000;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,.28), inset -2px -2px 0 rgba(0,0,0,.5), 0 3px 0 #1c1c1c;
  }
  .mc-btn:hover { background: linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,0) 46%, rgba(0,0,0,.2)), #82917f;
                  color: #ffffa6; outline: 2px solid #fff; outline-offset: -5px; }
  .mc-btn:active { transform: translateY(2px); box-shadow: inset 2px 2px 0 rgba(255,255,255,.2), inset -2px -2px 0 rgba(0,0,0,.5); }
  .mc-row { display: flex; gap: 8px; width: min(420px, 82vw); margin: 0 auto; }
  .mc-row .mc-btn { width: auto; flex: 1; }
  .mc-btn.sq { width: 50px; flex: 0 0 50px; padding: 12px 0; font-size: 16px; }

  #controlsBox {
    width: min(420px, 82vw); margin: 4px auto 0; display: none; flex-wrap: wrap; gap: 6px;
    justify-content: center; background: rgba(0,0,0,.4); border: 2px solid #000; padding: 12px;
  }
  #controlsBox.show { display: flex; }
  #controlsBox .key { font-family: 'Press Start 2P', monospace; font-size: 9px; line-height: 1.5;
    color: #d8d8d8; background: #4a4a4a; border: 2px solid #000;
    box-shadow: inset 1px 1px 0 rgba(255,255,255,.2); padding: 7px 8px; text-shadow: 1px 1px 0 #222; }

  .mc-foot { position: fixed; bottom: 8px; font-family: 'Press Start 2P', monospace;
             font-size: 10px; color: #e8e8e8; text-shadow: 2px 2px 0 #2a2a2a; z-index: 41; pointer-events: none; }
  .mc-foot.left { left: 10px; } .mc-foot.right { right: 10px; }
  #overlay.hidden ~ .mc-foot { display: none; }

  /* ---------- Mobile controls ---------- */
  #touchUI { position: fixed; inset: 0; z-index: 15; display: none; pointer-events: none; }
  #joy { position: absolute; left: 26px; bottom: 90px; width: 120px; height: 120px;
         border-radius: 50%; background: rgba(255,255,255,.12); border: 2px solid rgba(255,255,255,.3);
         pointer-events: auto; }
  #joyKnob { position: absolute; left: 35px; top: 35px; width: 50px; height: 50px; border-radius: 50%;
             background: rgba(255,255,255,.5); }
  #jumpBtn { position: absolute; right: 30px; bottom: 110px; width: 84px; height: 84px; border-radius: 50%;
             background: rgba(124,224,138,.4); border: 2px solid rgba(255,255,255,.5); color: #fff;
             font-weight: 800; font-size: 14px; pointer-events: auto; display:flex;align-items:center;justify-content:center; }
  body.touch #touchUI { display: block; }

  #loading { position: fixed; inset: 0; z-index: 60; background: #0b1320; color: #9fc3ff;
             display: flex; align-items: center; justify-content: center; font-size: 14px; letter-spacing: 3px; }

  #muteBtn { position: fixed; top: 12px; right: 14px; z-index: 30; width: 42px; height: 42px;
             border-radius: 8px; border: 2px solid rgba(255,255,255,.35); background: rgba(0,0,0,.35);
             color: #fff; font-size: 18px; cursor: pointer; display: none; }
  #muteBtn:hover { background: rgba(0,0,0,.55); }
</style>
</head>
<body>
  <div id="loading">LOADING WORLD…</div>

  <audio id="bgm" src="assets/minecraft-bg.mp3" loop preload="auto"></audio>
  <button id="muteBtn" title="Toggle music">🔊</button>

  <div id="compass">N</div>
  <div id="crosshair"></div>

  <div id="hotbar">
    <div class="slot active"><span class="num">1</span>🏠</div>
    <div class="slot"><span class="num">2</span>🚀</div>
    <div class="slot"><span class="num">3</span>🏆</div>

    <div class="slot"><span class="num">5</span>🏰</div>

  <div id="touchUI">
    <div id="joy"><div id="joyKnob"></div></div>

  <div id="overlay">
    <div class="mc-logo">
      <img id="logoImg" class="title-img" src="assets/temircraft.png" alt="TEMIRCRAFT">
      <div class="edition">PORTFOLIO EDITION</div>

    <button class="mc-btn" id="playBtn">Войти в мир</button>
    <button class="mc-btn" id="ctrlBtn">Управление</button>
    <div class="mc-row">
      <button class="mc-btn" id="menuMusicBtn">Музыка: Вкл</button>
      <button class="mc-btn sq" id="quitBtn" title="LinkedIn">in</button>
    </div>

    <div id="controlsBox">
      <span class="key">W A S D — Идти</span>
      <span class="key">Мышь / зажать — Обзор</span>
      <span class="key">Space — Прыжок</span>
      <span class="key">Shift — Бег</span>
      <span class="key">1–6 — Телепорт</span>
      <span class="key">Esc — Меню</span>
    </div>
  </div>
  <div class="mc-foot left">Portfolio Edition 1.0</div>
  <div class="mc-foot right">© MMXXVI · Temirlan Kalmukhan</div>

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

/* ---------- Lighting ---------- */
const sun = new THREE.DirectionalLight(0xfff4e0, 2.1);
sun.position.set(40, 70, 25);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const s = 90;
sun.shadow.camera.left = -s; sun.shadow.camera.right = s;
sun.shadow.camera.top = s; sun.shadow.camera.bottom = -s;
sun.shadow.camera.far = 220; sun.shadow.bias = -0.0004;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x4a6a3a, 0.85));
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

/* ---------- Procedural pixel textures ---------- */
function pixelTexture(draw, size = 16) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  draw(g, size);
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}
function noiseFill(g, size, base, vary) {
  for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) {
    const n = (Math.random() - 0.5) * vary;
    const r = clamp(base[0] + n), gr = clamp(base[1] + n), b = clamp(base[2] + n);
    g.fillStyle = `rgb(${r|0},${gr|0},${b|0})`;
    g.fillRect(x, y, 1, 1);
  }
}
const clamp = v => Math.max(0, Math.min(255, v));

// ---- Image textures (user-provided Minecraft blocks) ----
// Load via a plain <img> (no crossOrigin) so it works in sandboxed previews
// without CORS headers — THREE.TextureLoader forces crossOrigin='anonymous'
// and fails there. NearestFilter + ClampToEdge keeps non-power-of-two images
// from rendering black.
function blockTex(url) {
  const t = new THREE.Texture();
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.ClampToEdgeWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  const img = new Image();
  img.onload  = () => { t.image = img; t.needsUpdate = true; };
  img.onerror = () => console.warn('texture failed:', url);
  img.src = url;
  return t;
}

const grassMat = new THREE.MeshLambertMaterial({ map: texGrassTop });
const mat = {
  // no separate dirt texture supplied → grass on all faces
  grass:  [grassMat, grassMat, grassMat, grassMat, grassMat, grassMat],
  stone:  new THREE.MeshLambertMaterial({ map: texStone }),
  plank:  new THREE.MeshLambertMaterial({ map: texPlank }),
  leaves: new THREE.MeshLambertMaterial({ map: texLeaves }),
  log:    new THREE.MeshLambertMaterial({ map: texLog }),
  path:   new THREE.MeshLambertMaterial({ map: texSand }),
};

/* ---------- World construction ---------- */
const BOX = new THREE.BoxGeometry(1, 1, 1);
const colliders = []; // AABB solids for player collision
const SOLID = new Set(); // occupancy of solid cells "x,y,z" — used for headroom checks
const solidAt = (x, y, z) => SOLID.has(`${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`);
function addSolid(x, y, z) {
  SOLID.add(`${x},${y},${z}`);
  colliders.push({ min: new THREE.Vector3(x, y, z), max: new THREE.Vector3(x + 1, y + 1, z + 1) });
}

function block(x, y, z, material, solid = false) {
  const m = new THREE.Mesh(BOX, material);
  m.position.set(x + 0.5, y + 0.5, z + 0.5);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
  if (solid) addSolid(x, y, z);
  return m;
}

// Instanced ground for performance: big grass field
const WORLD = 64; // half-extent
(function buildGround() {
  const count = (WORLD * 2) * (WORLD * 2);
  const top = new THREE.InstancedMesh(BOX, [
    mat.grass[0], mat.grass[1], mat.grass[2], mat.grass[3], mat.grass[4], mat.grass[5]
  ], count);
  top.receiveShadow = true; top.castShadow = false;
  const dummy = new THREE.Object3D();
  let i = 0;
  for (let x = -WORLD; x < WORLD; x++) for (let z = -WORLD; z < WORLD; z++) {
    dummy.position.set(x + 0.5, -0.5, z + 0.5);
    dummy.updateMatrix();
    top.setMatrixAt(i++, dummy.matrix);
  }
  scene.add(top);
})();

// Stone plaza ring + paths
function fillRect(x0, z0, x1, z1, y, material, solid=false) {
  for (let x = x0; x <= x1; x++) for (let z = z0; z <= z1; z++) block(x, y, z, material, solid);
}

// Central plaza
fillRect(-6, -6, 6, 6, 0, mat.path);
// Four paths radiating out (to each zone)
for (let i = 7; i <= 22; i++) {
  block(i, 0, -1, mat.path); block(i, 0, 0, mat.path); block(i, 0, 1, mat.path);   // +X (Ventures)
  block(-i, 0, -1, mat.path); block(-i, 0, 0, mat.path); block(-i, 0, 1, mat.path); // -X (About)
  block(-1, 0, i, mat.path); block(0, 0, i, mat.path); block(1, 0, i, mat.path);     // +Z (Honors)
  block(-1, 0, -i, mat.path); block(0, 0, -i, mat.path); block(1, 0, -i, mat.path);  // -Z (Contact)
}

/* ---------- Sign / board factory (canvas text on plank panel) ---------- */
function makeBoardTexture(lines, opts = {}) {
  const W = 1024, H = 640;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');

  // --- parchment background with gradient + grain ---
  if (opts.bg) { g.fillStyle = opts.bg; g.fillRect(0, 0, W, H); }
  else {
    const grad = g.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#f0e2bf'); grad.addColorStop(0.5, '#e4d2a6'); grad.addColorStop(1, '#d3bd8e');
    g.fillStyle = grad; g.fillRect(0, 0, W, H);
    // faint horizontal grain
    g.fillStyle = 'rgba(150,110,60,.06)';
    for (let yy = 14; yy < H; yy += 22) g.fillRect(0, yy, W, 2);
    // soft vignette
    const vg = g.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, W*0.62);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(70,45,15,.22)');
    g.fillStyle = vg; g.fillRect(0, 0, W, H);
  }

  // --- decorative double frame ---
  g.strokeStyle = opts.border || '#5e3f1f'; g.lineWidth = 20;
  g.strokeRect(11, 11, W - 22, H - 22);
  g.strokeStyle = 'rgba(255,255,255,.10)'; g.lineWidth = 5;
  g.strokeRect(26, 26, W - 52, H - 52);
  g.strokeStyle = '#caa24a'; g.lineWidth = 3;                      // gold inner line
  g.strokeRect(34, 34, W - 68, H - 68);
  // corner rivets
  const rivet = (cx, cy) => {
    g.beginPath(); g.arc(cx, cy, 9, 0, Math.PI*2);
    g.fillStyle = '#3a2510'; g.fill();
    g.beginPath(); g.arc(cx-2, cy-2, 3.5, 0, Math.PI*2);
    g.fillStyle = '#c9a85f'; g.fill();
  };
  [[22,22],[W-22,22],[22,H-22],[W-22,H-22]].forEach(p => rivet(p[0], p[1]));

  // --- text + ornaments ---
  let y = opts.padTop || 70;
  lines.forEach((ln, idx) => {
    g.textAlign = ln.align || 'center';
    const cx = ln.align === 'left' ? 78 : (ln.align === 'right' ? W - 78 : W / 2);
    const isHeader = /^\s*—.*—\s*$/.test(ln.t) || (typeof ln.t === 'string' && ln.t.startsWith('—'));
    g.font = `${ln.weight || 700} ${ln.size || 34}px 'Georgia','Segoe UI',serif`;

    // section header → gold pill with side rules
    if (isHeader && ln.align !== 'left') {
      const label = ln.t.replace(/—/g, '').trim();
      g.font = `700 ${ln.size || 26}px 'Georgia',serif`;
      const tw = g.measureText(label).width;
      const half = tw/2 + 26;
      g.strokeStyle = 'rgba(90,60,25,.5)'; g.lineWidth = 2;
      g.beginPath(); g.moveTo(90, y - (ln.size||26)/3); g.lineTo(cx - half, y - (ln.size||26)/3);
      g.moveTo(cx + half, y - (ln.size||26)/3); g.lineTo(W - 90, y - (ln.size||26)/3); g.stroke();
      // diamonds at ends
      g.fillStyle = '#a9842f';
      [[90, y-(ln.size||26)/3],[W-90, y-(ln.size||26)/3]].forEach(([dx,dy])=>{
        g.save(); g.translate(dx,dy); g.rotate(Math.PI/4); g.fillRect(-5,-5,10,10); g.restore();
      });
      g.fillStyle = ln.color || '#1f6b3a';
      g.fillText(label, cx, y);
      y += (ln.lh || (ln.size || 26) + 14);
      return;
    }

    // subtle shadow for all text
    g.fillStyle = 'rgba(60,40,15,.28)';
    g.fillText(ln.t, cx + 1.5, y + 1.5);
    g.fillStyle = ln.color || '#2b1c0c';
    g.fillText(ln.t, cx, y);

    // underline ornament beneath a big title (first line, large)
    if (idx === 0 && (ln.size || 34) >= 32 && ln.align !== 'left' && !opts.noTitleRule) {
      const uy = y + 14;
      const tw = Math.min(g.measureText(ln.t).width * 0.62, W - 200);
      g.strokeStyle = '#a9842f'; g.lineWidth = 3;
      g.beginPath(); g.moveTo(cx - tw/2, uy); g.lineTo(cx - 16, uy);
      g.moveTo(cx + 16, uy); g.lineTo(cx + tw/2, uy); g.stroke();
      g.fillStyle = '#a9842f';                                   // center diamond
      g.save(); g.translate(cx, uy); g.rotate(Math.PI/4); g.fillRect(-6,-6,12,12); g.restore();
      y += 16;
    }
    y += (ln.lh || (ln.size || 34) + 14);
  });

  const t = new THREE.CanvasTexture(c);
  t.minFilter = THREE.LinearMipMapLinearFilter;
  t.anisotropy = 8;
  return t;
}

// A standing board: posts + panel, faces a given direction
function placeBoard(x, z, facing, lines, opts = {}) {
  const tex = makeBoardTexture(lines, opts);
  const w = opts.w || 7, h = opts.h || 4.4, baseY = opts.baseY || 1.4;
  // panel
  const panel = new THREE.Mesh(new THREE.PlaneGeometry(w, h),
    new THREE.MeshLambertMaterial({ map: tex }));
  panel.castShadow = true;
  // backing plank slab
  const back = new THREE.Mesh(new THREE.BoxGeometry(w + .4, h + .4, .25), mat.plank);
  back.castShadow = true; back.receiveShadow = true;

  const grp = new THREE.Group();
  grp.add(back); panel.position.z = 0.14; grp.add(panel);
  grp.position.set(x, baseY + h / 2, z);
  grp.rotation.y = facing;
  scene.add(grp);

  // wooden posts
  for (const dx of [-w/2 + .3, w/2 - .3]) {
    const post = new THREE.Mesh(new THREE.BoxGeometry(.4, baseY + h/2 + .5, .4), mat.log);
    const off = new THREE.Vector3(dx, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), facing);
    post.position.set(x + off.x, (baseY + h/2 + .5)/2, z + off.z);
    post.castShadow = true; scene.add(post);
  }
  return grp;
}

// Decorative wall of stacked blocks behind a zone
function zoneWall(cx, cz, facing, color) {
  const len = 44, hgt = 5;
  for (let i = -len/2; i <= len/2; i++) for (let y = 0; y <= hgt; y++) {
    const useStone = (y === hgt) || (Math.abs(i) % 3 === 0);
    const off = new THREE.Vector3(i, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), facing);
    block(Math.round(cx + off.x), y, Math.round(cz + off.z),
          useStone ? mat.stone : mat.plank, true);
  }
}

/* ---------- Trees ---------- */
function tree(x, z) {
  const h = 4 + (Math.random() * 2 | 0);
  for (let y = 0; y < h; y++) block(x, y, z, mat.log, y < 2);
  for (let dx = -2; dx <= 2; dx++) for (let dz = -2; dz <= 2; dz++) for (let dy = 0; dy <= 2; dy++) {
    if (Math.abs(dx) === 2 && Math.abs(dz) === 2 && dy !== 1) continue;
    if (dy === 2 && (Math.abs(dx) === 2 || Math.abs(dz) === 2)) continue;
    if (dx === 0 && dz === 0 && dy < 2) continue;
    block(x + dx, h - 1 + dy, z + dz, mat.leaves);
  }
}

   ========================================================= */
const matGlass = new THREE.MeshLambertMaterial({ color:0xbfe3f2, transparent:true, opacity:0.5 });
const matRoof  = new THREE.MeshLambertMaterial({ color:0x8a3b2e });
const matWhite = new THREE.MeshLambertMaterial({ color:0xe9e2d0 });
const matRed   = new THREE.MeshLambertMaterial({ color:0xc0392b });
const matWater = new THREE.MeshLambertMaterial({ color:0x2a86d8, transparent:true, opacity:0.72 });

// Batch builder: collect 1×1 cubes per material, emit one InstancedMesh each.
const STRUCT = new Map();
function brick(x, y, z, m, solid = true) {
  if (!m) return;
  if (!STRUCT.has(m)) STRUCT.set(m, []);
  STRUCT.get(m).push([x, y, z]);
  if (solid) addSolid(x, y, z);
}
function slab(x0, z0, x1, z1, y, m, solid = true) {
  for (let x = x0; x <= x1; x++) for (let z = z0; z <= z1; z++) brick(x, y, z, m, solid);
}
function buildStruct() {
  const dummy = new THREE.Object3D();
  for (const [m, list] of STRUCT) {
    const im = new THREE.InstancedMesh(BOX, m, list.length);
    im.castShadow = true; im.receiveShadow = true;
    list.forEach(([x, y, z], i) => { dummy.position.set(x+0.5, y+0.5, z+0.5); dummy.updateMatrix(); im.setMatrixAt(i, dummy.matrix); });
    im.instanceMatrix.needsUpdate = true;
    scene.add(im);
  }
  STRUCT.clear();
}

   ========================================================= */
const player = {
  pos: new THREE.Vector3(0, 1.7, 0),
  vel: new THREE.Vector3(),
  onGround: false,
  height: 1.7, radius: 0.32,
  yaw: Math.PI, pitch: 0,
};
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; });
addEventListener('keyup',   e => { keys[e.code] = false; });

const overlay = document.getElementById('overlay');
const playBtn = document.getElementById('playBtn');
let locked = false;

let dragging = false; // fallback drag-to-look when pointer lock isn't available

// ---- Background music (starts on the Enter-World user gesture) ----
const bgm = document.getElementById('bgm');
const muteBtn = document.getElementById('muteBtn');
bgm.volume = 0.45;
let musicOn = true;
function startMusic() {
  if (!musicOn) return;
  bgm.play().catch(() => {}); // ignore autoplay rejections
}
muteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  musicOn = !musicOn;
  if (musicOn) { bgm.play().catch(() => {}); muteBtn.textContent = '🔊'; }
  else { bgm.pause(); muteBtn.textContent = '🔇'; }
});

// ---- Minecraft menu buttons ----
const ctrlBtn = document.getElementById('ctrlBtn');
const controlsBox = document.getElementById('controlsBox');
ctrlBtn.addEventListener('click', () => controlsBox.classList.toggle('show'));

const menuMusicBtn = document.getElementById('menuMusicBtn');
menuMusicBtn.addEventListener('click', () => {
  musicOn = !musicOn;
  menuMusicBtn.textContent = 'Музыка: ' + (musicOn ? 'Вкл' : 'Выкл');
  muteBtn.textContent = musicOn ? '🔊' : '🔇';
  if (musicOn) bgm.play().catch(() => {}); else bgm.pause();
});

document.getElementById('quitBtn').addEventListener('click', () =>
  window.open('https://linkedin.com/in/temirlan-kalmukhan', '_blank'));

// Knock out the white background of the TEMIRCRAFT logo → transparent.
(function dewhiteLogo() {
  const img = document.getElementById('logoImg');
  if (!img) return;
  const process = () => {
    try {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      const g = c.getContext('2d');
      g.drawImage(img, 0, 0);
      const data = g.getImageData(0, 0, c.width, c.height);
      const d = data.data;
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], gr = d[i+1], b = d[i+2];
        const minc = Math.min(r, gr, b);
        if (minc > 228) d[i+3] = 0;                       // pure white → transparent
        else if (minc > 200) d[i+3] = (228 - minc) * 8;   // feather near-white edges
      }
      g.putImageData(data, 0, 0);
      img.src = c.toDataURL('image/png');
    } catch (_) { /* canvas tainted (file://) — keep original */ }
  };
  if (img.complete && img.naturalWidth) process();
  else img.addEventListener('load', process, { once: true });
})();

// Rotating splash texts (like the yellow Minecraft splash)
const splashes = ['Vibe coded!', 'Built by AI agents!', '5 ventures by 15!',
  '200+ users week one!', 'Lovable for extensions!', 'Pitching is a contact sport!',
  'Astana, Kazakhstan!', 'Walk the four paths!', '100% voxels!'];
const splashEl = document.getElementById('splash');
let splashIdx = 0;
setInterval(() => { splashIdx = (splashIdx + 1) % splashes.length;
  splashEl.textContent = splashes[splashIdx]; }, 3000);

// Esc opens/closes the menu (pause)
function openMenu() {
  overlay.classList.remove('hidden');
  if (document.pointerLockElement) document.exitPointerLock();
  dragging = false;
}
addEventListener('keydown', (e) => {
  if (e.code === 'Escape') {
    if (overlay.classList.contains('hidden')) openMenu();
    else playBtn.click();
  }
});

playBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  muteBtn.style.display = 'block';
  startMusic();
  // Try pointer lock; if it fails (e.g. inside an iframe/preview), drag-to-look still works.
  if (!isTouch && renderer.domElement.requestPointerLock) {
    try { renderer.domElement.requestPointerLock(); } catch (_) {}
  }
});
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('pointerlockerror', () => { locked = false; });

function applyLook(dx, dy) {
  player.yaw   -= dx * 0.0024;
  player.pitch -= dy * 0.0024;
  player.pitch = Math.max(-1.5, Math.min(1.5, player.pitch));
}

// Locked mode: raw mouse deltas.
document.addEventListener('mousemove', e => {
  if (locked) applyLook(e.movementX, e.movementY);
});

// Fallback: hold the left mouse button and drag to look around.
renderer.domElement.addEventListener('mousedown', e => {
  if (locked || isTouch) return;
  if (overlay.classList.contains('hidden')) {
    dragging = true;
    renderer.domElement.style.cursor = 'grabbing';
    // Re-attempt pointer lock on user gesture (some browsers require a fresh click).
    if (renderer.domElement.requestPointerLock) {
      try { renderer.domElement.requestPointerLock(); } catch (_) {}
    }
  }
});
addEventListener('mouseup', () => { dragging = false; renderer.domElement.style.cursor = ''; });
renderer.domElement.addEventListener('mousemove', e => {
  if (!locked && dragging) applyLook(e.movementX, e.movementY);
});
// Also allow look while NOT dragging once you've entered (smooth, optional): edge-pan disabled to avoid surprise.

/* ---------- Touch controls ---------- */
const isTouch = matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;
if (isTouch) document.body.classList.add('touch');
const joy = { active:false, id:null, dx:0, dy:0, cx:0, cy:0 };
const joyEl = document.getElementById('joy'), knob = document.getElementById('joyKnob');
if (isTouch) {
  const R = 50;
  joyEl.addEventListener('touchstart', e => {
    const r = joyEl.getBoundingClientRect(); joy.cx = r.left + 60; joy.cy = r.top + 60;
    joy.active = true; joy.id = e.changedTouches[0].identifier; e.preventDefault();
  }, {passive:false});
  addEventListener('touchmove', e => {
    for (const t of e.changedTouches) if (t.identifier === joy.id) {
      let dx = t.clientX - joy.cx, dy = t.clientY - joy.cy;
      const len = Math.hypot(dx, dy) || 1; const cl = Math.min(len, R);
      dx = dx/len*cl; dy = dy/len*cl;
      joy.dx = dx/R; joy.dy = dy/R;
      knob.style.transform = `translate(${dx}px,${dy}px)`;
    }
  }, {passive:false});
  addEventListener('touchend', e => {
    for (const t of e.changedTouches) if (t.identifier === joy.id) {
      joy.active = false; joy.dx = joy.dy = 0; knob.style.transform = '';
    }
  });
  // look: drag on right side of screen
  let look = { id:null, x:0, y:0 };
  addEventListener('touchstart', e => {
    for (const t of e.changedTouches) {
      if (t.clientX > innerWidth/2 && look.id === null) { look.id = t.identifier; look.x = t.clientX; look.y = t.clientY; }
    }
  });
  addEventListener('touchmove', e => {
    for (const t of e.changedTouches) if (t.identifier === look.id) {
      player.yaw   -= (t.clientX - look.x) * 0.005;
      player.pitch -= (t.clientY - look.y) * 0.005;
      player.pitch = Math.max(-1.5, Math.min(1.5, player.pitch));
      look.x = t.clientX; look.y = t.clientY;
    }
  });
  addEventListener('touchend', e => {
    for (const t of e.changedTouches) if (t.identifier === look.id) look.id = null;
  });
  document.getElementById('jumpBtn').addEventListener('touchstart', e => {
    if (player.onGround) { player.vel.y = 7.4; player.onGround = false; } e.preventDefault();
  }, {passive:false});
}

/* ---------- Collision (swept AABB against block colliders) ---------- */
const STEP = 1.05; // auto-step height (climb stairs / 1-block ledges)

// A block is steppable only if there's headroom above it for the player —
// this lets you walk up stairs/ledges but NOT climb solid walls.
function steppable(c) {
  const bx = Math.floor(c.min.x), by = Math.floor(c.min.y), bz = Math.floor(c.min.z);
  return !solidAt(bx, by + 1, bz) && !solidAt(bx, by + 2, bz);
}

// Horizontal collision with auto-step.
function collide(pos) {
  const r = player.radius, ph = player.height;
  const feet = pos.y - ph, head = pos.y;
  for (const c of colliders) {
    const minX = c.min.x - r, maxX = c.max.x + r;
    const minZ = c.min.z - r, maxZ = c.max.z + r;
    if (pos.x > minX && pos.x < maxX && pos.z > minZ && pos.z < maxZ &&
        head > c.min.y && feet < c.max.y) {
      if (c.max.y <= feet + STEP && steppable(c)) continue;  // step up onto it
      const pX = pos.x < (c.min.x+c.max.x)/2 ? minX - pos.x : maxX - pos.x;
      const pZ = pos.z < (c.min.z+c.max.z)/2 ? minZ - pos.z : maxZ - pos.z;
      if (Math.abs(pX) < Math.abs(pZ)) pos.x += pX; else pos.z += pZ;
    }
  }
}

// Highest standable surface under the player's center.
function supportHeight(pos) {
  let h = 0; // world ground
  const feet = pos.y - player.height;
  for (const c of colliders) {
    if (pos.x > c.min.x && pos.x < c.max.x && pos.z > c.min.z && pos.z < c.max.z) {
      if (c.max.y <= feet + STEP && c.max.y > h && steppable(c)) h = c.max.y;
    }
  }
  return h;
}

/* ---------- Zone detection for HUD toast ---------- */
const compass = document.getElementById('compass');
const toast = document.getElementById('zoneToast');
const slots = [...document.querySelectorAll('.slot')];
let currentZone = -1;
const zones = [
  { name:'ABOUT', sub:'I', test:p => p.x < -14 && Math.abs(p.z) < 20, slot:0 },
  { name:'VENTURES', sub:'II', test:p => p.x > 14 && Math.abs(p.z) < 20, slot:1 },
  { name:'HONORS', sub:'III', test:p => p.z > 14 && Math.abs(p.x) < 18, slot:2 },
  { name:'CONTACT', sub:'IV', test:p => p.z < -14 && Math.abs(p.x) < 14, slot:3 },
];
function updateZone() {
  let z = -1;
  for (let i = 0; i < zones.length; i++) if (zones[i].test(player.pos)) { z = i; break; }
  if (z !== currentZone) {
    currentZone = z;
    slots.forEach((s, i) => s.classList.toggle('active', z === -1 ? i === 0 : zones[z]?.slot === i));
    if (z >= 0) {
      toast.querySelector('.big').textContent = zones[z].name;
      toast.querySelector('.small').textContent = zones[z].sub;
      toast.classList.add('show');
      clearTimeout(toast._t); toast._t = setTimeout(() => toast.classList.remove('show'), 2200);
    }
  }
}
const dirs = ['N','NE','E','SE','S','SW','W','NW'];
function updateCompass() {
  let a = ((player.yaw % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const idx = Math.round(a / (Math.PI/4)) % 8;
  compass.textContent = dirs[idx];
}

/* ---------- Hotbar teleport (press 1-4) ---------- */
// Each inventory item warps you straight in front of that zone's boards.
const teleports = [
  { name:'HOME',     sub:'SPAWN', x: 0,  z: 1,   yaw: Math.PI },        // 1 · 🏠
  { name:'VENTURES', sub:'II',    x: 18, z: -1,  yaw: -Math.PI / 2 },   // 2 · 🚀
  { name:'HONORS',   sub:'III',   x: 0,  z: 18,  yaw: Math.PI },        // 3 · 🏆
  { name:'CONTACT',  sub:'IV',    x: 0,  z: -18, yaw: 0 },              // 4 · ✉️
  { name:'MANSION',  sub:'HOME',  x: 0,  z: -43, yaw: 0 },              // 5 · 🏰 (front door)
  { name:'BEACH',    sub:'BAR',   x: 0,  z: 44,  yaw: Math.PI },        // 6 · 🏖️
];
function teleportTo(i) {
  const t = teleports[i];
  if (!t) return;
  player.pos.set(t.x, player.height, t.z);
  player.vel.set(0, 0, 0);
  player.yaw = t.yaw;
  player.pitch = 0;
  player.onGround = true;
  // highlight chosen inventory slot
  slots.forEach((sl, idx) => sl.classList.toggle('active', idx === i));
  currentZone = -2; // force zone re-eval on next frame
  // toast feedback
  toast.querySelector('.big').textContent = t.name;
  toast.querySelector('.small').textContent = t.sub;
  toast.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => toast.classList.remove('show'), 2000);
}
addEventListener('keydown', e => {
  const n = { Digit1:0, Numpad1:0, Digit2:1, Numpad2:1, Digit3:2, Numpad3:2, Digit4:3, Numpad4:3,
              Digit5:4, Numpad5:4, Digit6:5, Numpad6:5 }[e.code];
  if (n !== undefined) teleportTo(n);
});
// also let clicking a hotbar slot teleport (handy on laptop/touch)
slots.forEach((sl, i) => { sl.style.pointerEvents = 'auto'; sl.style.cursor = 'pointer';
  sl.addEventListener('click', () => teleportTo(i)); });

/* ---------- Main loop ---------- */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // paused while the menu is open
  const paused = !overlay.classList.contains('hidden');

  // movement input
  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right   = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
  const move = new THREE.Vector3();
  if (!paused && keys['KeyW']) move.add(forward);
  if (!paused && keys['KeyS']) move.sub(forward);
  if (!paused && keys['KeyD']) move.add(right);
  if (!paused && keys['KeyA']) move.sub(right);
  if (!paused && isTouch && (joy.dx || joy.dy)) { move.add(forward.clone().multiplyScalar(-joy.dy)); move.add(right.clone().multiplyScalar(joy.dx)); }
  if (move.lengthSq() > 0) move.normalize();

  const sprint = keys['ShiftLeft'] || keys['ShiftRight'] ? 1.7 : 1;
  const speed = 5.2 * sprint;
  player.vel.x = move.x * speed;
  player.vel.z = move.z * speed;

  if (!paused && keys['Space'] && player.onGround) { player.vel.y = 7.4; player.onGround = false; }
  player.vel.y -= 22 * dt; // gravity

  // integrate with axis-separated collision
  player.pos.x += player.vel.x * dt; collide(player.pos);
  player.pos.z += player.vel.z * dt; collide(player.pos);
  player.pos.y += player.vel.y * dt;

  // land on the highest block surface beneath us (enables floors / stairs)
  const floorY = supportHeight(player.pos);
  if (player.pos.y - player.height <= floorY) {
    player.pos.y = floorY + player.height; player.vel.y = 0; player.onGround = true;
  } else {
    player.onGround = false;
  }

  // keep inside world
  const lim = WORLD - 2;
  player.pos.x = Math.max(-lim, Math.min(lim, player.pos.x));
  player.pos.z = Math.max(-lim, Math.min(lim, player.pos.z));

  // camera
  camera.position.copy(player.pos);
  const dir = new THREE.Vector3(
    -Math.sin(player.yaw) * Math.cos(player.pitch),
    Math.sin(player.pitch),
    -Math.cos(player.yaw) * Math.cos(player.pitch)
  );
  camera.lookAt(player.pos.clone().add(dir));

  // subtle head-bob
  if (move.lengthSq() > 0 && player.onGround) {
    camera.position.y += Math.sin(clock.elapsedTime * 11) * 0.04;
  }

  updateZone();
  updateCompass();
  renderer.render(scene, camera);
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

document.getElementById('loading').style.display = 'none';
animate();
</script>
